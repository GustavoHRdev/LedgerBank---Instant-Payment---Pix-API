spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USERNAME:pixuser}
    password: ${DB_PASSWORD:pixpass}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:pixuser}
    password: ${RABBITMQ_PASSWORD:pixpass}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000ms
          multiplier: 2
          max-attempts: 3
        default-requeue-rejected: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
app:
  messaging:
    pix-requested-exchange: pix.requested
    pix-requested-queue: payment.transfer-processor
    pix-requested-routing-key: pix.transfer.requested
    pix-events-exchange: pix.events
    transfer-completed-routing-key: transfer.completed
    transfer-failed-routing-key: transfer.failed
    pix-requested-dlx: pix.requested.dlx
    pix-requested-dlq: pix.dead-letter
    pix-requested-dlq-routing-key: pix.transfer.requested.dlq
    consumer-name: payment-service
    outbox-publish-batch-size: 50
server:
  port: ${SERVER_PORT:8082}
