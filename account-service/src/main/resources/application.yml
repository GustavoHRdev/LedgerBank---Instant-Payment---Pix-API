spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:account_db}
    username: ${DB_USERNAME:pixuser}
    password: ${DB_PASSWORD:pixpass}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:pixuser}
    password: ${RABBITMQ_PASSWORD:pixpass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
app:
  messaging:
    pix-requested-exchange: pix.requested
    pix-requested-routing-key: pix.transfer.requested
    pix-events-exchange: pix.events
    transfer-completed-routing-key: transfer.completed
    transfer-failed-routing-key: transfer.failed
    completed-notification-queue: account.notification-sender.completed
    failed-notification-queue: account.notification-sender.failed
    notification-consumer-name: account.notification-sender
    outbox-publish-batch-size: 50
server:
  port: ${SERVER_PORT:8081}
